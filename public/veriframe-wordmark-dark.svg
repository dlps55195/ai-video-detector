<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 92" width="440" height="92">
  <defs>
    <linearGradient id="gD" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd060"/>
      <stop offset="100%" stop-color="#e8820c"/>
    </linearGradient>
    <linearGradient id="sD" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#f5a623" stop-opacity="0"/>
      <stop offset="38%"  stop-color="#f5a623" stop-opacity="1"/>
      <stop offset="62%"  stop-color="#f5a623" stop-opacity="1"/>
      <stop offset="100%" stop-color="#f5a623" stop-opacity="0"/>
    </linearGradient>
    <filter id="glD" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="pgD" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- outer film frame -->
  <rect x="4" y="4" width="80" height="80" rx="7" fill="none" stroke="url(#gD)" stroke-width="2" filter="url(#glD)"/>
  <!-- sprockets top -->
  <rect x="14"  y="7.5" width="7" height="5" rx="1.5" fill="#f5a623" opacity="0.65"/>
  <rect x="28"  y="7.5" width="7" height="5" rx="1.5" fill="#f5a623" opacity="0.65"/>
  <rect x="42"  y="7.5" width="7" height="5" rx="1.5" fill="#f5a623" opacity="0.65"/>
  <rect x="56"  y="7.5" width="7" height="5" rx="1.5" fill="#f5a623" opacity="0.65"/>
  <rect x="70"  y="7.5" width="7" height="5" rx="1.5" fill="#f5a623" opacity="0.65"/>
  <!-- sprockets bottom -->
  <rect x="14" y="75.5" width="7" height="5" rx="1.5" fill="#f5a623" opacity="0.65"/>
  <rect x="28" y="75.5" width="7" height="5" rx="1.5" fill="#f5a623" opacity="0.65"/>
  <rect x="42" y="75.5" width="7" height="5" rx="1.5" fill="#f5a623" opacity="0.65"/>
  <rect x="56" y="75.5" width="7" height="5" rx="1.5" fill="#f5a623" opacity="0.65"/>
  <rect x="70" y="75.5" width="7" height="5" rx="1.5" fill="#f5a623" opacity="0.65"/>
  <!-- picture area (dark fill so icon reads on transparent bg) -->
  <rect x="8" y="16" width="72" height="56" fill="#07070d"/>
  <rect x="8" y="16" width="72" height="56" fill="none" stroke="#f5a623" stroke-width="0.6" opacity="0.18"/>
  <!-- HUD corners -->
  <path d="M14 22 L14 19 L17 19" stroke="#f5a623" stroke-width="1.8" fill="none" stroke-linecap="round" filter="url(#glD)"/>
  <path d="M74 22 L74 19 L71 19" stroke="#f5a623" stroke-width="1.8" fill="none" stroke-linecap="round" filter="url(#glD)"/>
  <path d="M14 66 L14 69 L17 69" stroke="#f5a623" stroke-width="1.8" fill="none" stroke-linecap="round" filter="url(#glD)"/>
  <path d="M74 66 L74 69 L71 69" stroke="#f5a623" stroke-width="1.8" fill="none" stroke-linecap="round" filter="url(#glD)"/>
  <!-- ghost grid -->
  <line x1="8"  y1="44" x2="80" y2="44" stroke="#f5a623" stroke-width="0.4" opacity="0.1"/>
  <line x1="44" y1="16" x2="44" y2="72" stroke="#f5a623" stroke-width="0.4" opacity="0.1"/>
  <!-- detection eye -->
  <path d="M19 44 Q44 26 69 44 Q44 62 19 44 Z" fill="none" stroke="url(#gD)" stroke-width="1.7" filter="url(#glD)"/>
  <circle cx="44" cy="44" r="9.5" fill="none" stroke="url(#gD)" stroke-width="1.8" filter="url(#glD)"/>
  <circle cx="44" cy="44" r="3.5" fill="#ffd060" filter="url(#pgD)"/>
  <!-- scan line -->
  <line x1="8" y1="44" x2="80" y2="44" stroke="url(#sD)" stroke-width="1.3" opacity="0.85"/>
  <!-- wordmark -->
  <text x="106" y="51" font-family="'Syne','Arial Black',sans-serif" font-size="40" font-weight="700" fill="#ffffff" letter-spacing="-0.5">VERI</text>
  <text x="222" y="51" font-family="'Syne','Arial Black',sans-serif" font-size="40" font-weight="800" fill="#f5a623" letter-spacing="-1" filter="url(#glD)">FRAME</text>
  <text x="106" y="69" font-family="'Share Tech Mono','Courier New',monospace" font-size="9" fill="#4a3e28" letter-spacing="3.8">AI VIDEO DETECTION</text>
</svg>
